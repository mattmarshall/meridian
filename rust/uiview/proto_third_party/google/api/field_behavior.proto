// Vendored minimal copy of google/api/field_behavior.proto so prost-build
// can resolve the import without a network fetch. Mirrors the upstream
// definition at github.com/googleapis/googleapis; the FieldBehavior values
// are stable proto3 enums.
syntax = "proto3";

package google.api;

import "google/protobuf/descriptor.proto";

option java_package = "com.google.api";
option java_outer_classname = "FieldBehaviorProto";
option java_multiple_files = true;

extend google.protobuf.FieldOptions {
  repeated FieldBehavior field_behavior = 1052 [packed = false];
}

enum FieldBehavior {
  FIELD_BEHAVIOR_UNSPECIFIED = 0;
  OPTIONAL = 1;
  REQUIRED = 2;
  OUTPUT_ONLY = 3;
  INPUT_ONLY = 4;
  IMMUTABLE = 5;
  UNORDERED_LIST = 6;
  NON_EMPTY_DEFAULT = 7;
  IDENTIFIER = 8;
}
