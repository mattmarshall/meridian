name: swift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: swift-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build MeridianUI (macOS)
    # rules_swift needs a full Xcode; GitHub macos-latest runners ship one.
    # This compiles the swift-protobuf descriptor types + the SwiftUI renderer,
    # the validation a Command-Line-Tools-only dev box can't do locally.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.10.0
        with:
          bazelisk-cache: true
          disk-cache: meridian-swift-macos
          repository-cache: true
      # --lockfile_mode=off: resolve modules fresh. The committed
      # MODULE.bazel.lock predates a registry bazel_registry.json change, and
      # it can't be cleanly regenerated off-CI (the apple_cc extension needs
      # Xcode). Resolving fresh sidesteps the stale-checksum error; the runner
      # has Xcode so apple_cc resolves here.
      - run: bazel build --lockfile_mode=off //proto:MeridianProto //swift:MeridianUI
